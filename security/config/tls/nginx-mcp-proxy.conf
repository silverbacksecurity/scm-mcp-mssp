# Nginx TLS reverse proxy for scm-mcp-mssp SSE transport.
# Only needed if you expose --transport sse beyond localhost.
# For stdio transport (default), this file is not used.
#
# Prerequisites:
#   - cert-manager or Let's Encrypt certificate at the paths below
#   - ufw: allow 443/tcp from trusted CIDR only
#   - scm-mcp running: uv run scm-mcp --transport sse --host 127.0.0.1 --port 8000
#
# Install: ln -s /opt/scm-mcp-mssp/security/config/tls/nginx-mcp-proxy.conf \
#               /etc/nginx/sites-enabled/scm-mcp

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mcp.yourdomain.internal;  # replace with your hostname

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/scm-mcp.crt;
    ssl_certificate_key /etc/ssl/private/scm-mcp.key;

    # TLS 1.3 only (1.2 as minimum for older clients)
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES256-GCM-SHA384';

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # DH params (generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/dhparam.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MCP:10m;
    ssl_session_tickets off;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Access control ─────────────────────────────────────────────────────────
    # Restrict to your MCP client IP(s) — Claude Desktop host, CI runners, etc.
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    # Define zone in nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=mcp:10m rate=60r/m;
    limit_req zone=mcp burst=20 nodelay;

    # ── Proxy to MCP SSE backend ───────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # SSE requires long-lived connections
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;

        # Required for SSE
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering no;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mcp.yourdomain.internal;
    return 301 https://$host$request_uri;
}
