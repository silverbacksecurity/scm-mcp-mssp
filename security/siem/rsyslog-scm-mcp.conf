# /etc/rsyslog.d/50-scm-mcp.conf
# Forward scm-mcp-mssp structured JSON logs to a central SIEM.
# Requires rsyslog >= 8.x with omfwd module.
#
# After installing: systemctl restart rsyslog

# ── Load required modules ──────────────────────────────────────────────────────
module(load="imjournal" StateFile="imjournal.state")

# ── Capture scm-mcp journal entries ───────────────────────────────────────────
# The service writes to journal with SyslogIdentifier=scm-mcp
if $programname == "scm-mcp" then {

    # ── Local audit log (SOC2 evidence: 1-year retention minimum) ─────────────
    action(
        type="omfile"
        File="/var/log/scm-mcp/audit.log"
        FileCreateMode="0640"
        DirCreateMode="0750"
        FileOwner="scm-mcp"
        FileGroup="adm"
        # Rotate via logrotate (see logrotate.d snippet at bottom of file)
    )

    # ── Forward to SIEM over TLS ───────────────────────────────────────────────
    # Replace SIEM_HOST and SIEM_PORT with your collector endpoint.
    # For Elasticsearch/Logstash: typically port 5044 (Beats input) or 5000.
    # For Splunk HEC: use omhttp module instead (example commented below).
    action(
        type="omfwd"
        Target="SIEM_HOST"
        Port="5044"
        Protocol="tcp"
        StreamDriver="gtls"
        StreamDriverMode="1"
        StreamDriverAuthMode="x509/name"
        StreamDriverPermittedPeers="*.yoursiem.internal"
        # TLS certificates for mutual auth:
        # Place CA cert at /etc/ssl/certs/siem-ca.crt
        # Place client cert/key at /etc/ssl/scm-mcp-client.{crt,key}
        queue.type="LinkedList"
        queue.size="10000"
        queue.filename="scm-mcp-fwd"
        queue.highWaterMark="9000"
        queue.saveonshutdown="on"
        action.resumeRetryCount="-1"
    )

    stop
}

# ── Logrotate snippet (/etc/logrotate.d/scm-mcp) ─────────────────────────────
# /var/log/scm-mcp/*.log {
