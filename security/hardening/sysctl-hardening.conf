# /etc/sysctl.d/99-scm-mcp.conf
# Kernel hardening for scm-mcp-mssp VM. Applied by harden-server.sh.

# ── Network hardening ─────────────────────────────────────────────────────────
# Disable IP source routing (prevent route spoofing)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Disable ICMP redirect acceptance and sending
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# Enable SYN cookie protection (mitigates SYN flood DoS)
net.ipv4.tcp_syncookies = 1

# Log packets with impossible source addresses (martians)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP broadcast requests
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Reverse path filtering (drop packets that can't be routed back)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable IPv6 if not needed (adjust if your SIEM uses IPv6)
# net.ipv6.conf.all.disable_ipv6 = 1

# ── Memory and process hardening ─────────────────────────────────────────────
# Enable ASLR (address space layout randomization)
kernel.randomize_va_space = 2

# Disable core dumps from SUID programs (prevents credential leakage)
fs.suid_dumpable = 0

# Restrict ptrace to parent processes only (prevents credential scraping)
kernel.yama.ptrace_scope = 1

# Disable magic SysRq key (prevents emergency console commands)
kernel.sysrq = 0

# Restrict kernel pointer exposure in /proc
kernel.kptr_restrict = 2

# Restrict dmesg to root (hides kernel addresses)
kernel.dmesg_restrict = 1

# Restrict unprivileged BPF
kernel.unprivileged_bpf_disabled = 1

# ── File system ───────────────────────────────────────────────────────────────
# Protect symlinks in /tmp (prevents TOCTOU attacks)
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
