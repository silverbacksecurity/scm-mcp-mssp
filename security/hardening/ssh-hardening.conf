# /etc/ssh/sshd_config.d/99-scm-mcp-hardening.conf
# Drop-in SSH hardening for the scm-mcp-mssp host.
# Applied by harden-server.sh via: sshd -t && systemctl reload sshd

# ── Protocol ──────────────────────────────────────────────────────────────────
Protocol 2

# ── Authentication ────────────────────────────────────────────────────────────
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
PermitEmptyPasswords no
ChallengeResponseAuthentication no

# Limit auth attempts before disconnect
MaxAuthTries 3
MaxStartups 10:30:60

# Short window to complete authentication
LoginGraceTime 30

# ── Session limits ────────────────────────────────────────────────────────────
# Disconnect idle sessions after 5 minutes (300s * 2 = 10 min total)
ClientAliveInterval 300
ClientAliveCountMax 2

# Limit concurrent open sessions per connection
MaxSessions 4

# ── Forwarding (disabled — not needed for MCP server) ─────────────────────────
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
GatewayPorts no
PermitTunnel no

# ── Hardened algorithms ───────────────────────────────────────────────────────
# Restrict to modern key exchange, ciphers, and MACs
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# ── Logging ───────────────────────────────────────────────────────────────────
# VERBOSE logs the key fingerprint on login (useful for SOC2 access audit trail)
LogLevel VERBOSE
SyslogFacility AUTH

# ── Miscellaneous ─────────────────────────────────────────────────────────────
PrintLastLog yes
PrintMotd no
Banner /etc/ssh/banner.txt
