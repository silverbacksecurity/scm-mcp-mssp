# ──────────────────────────────────────────────────────────────────────────────
# settings.example.toml — dynaconf configuration template
#
#   cp settings.example.toml settings.toml   ← then add your tenants
#
# settings.toml is git-ignored: tenant IDs, client IDs, and customer labels
# identify your customers and must never be committed to a shared repository.
# Secrets (client_secret) go in .secrets.toml (also git-ignored).
# ──────────────────────────────────────────────────────────────────────────────

[default]
log_level = "INFO"
log_json  = true
mssp_mode = true
scm_default_folder = "Shared"

# ── MSSP multi-tenant configuration ───────────────────────────────────────────
# Uncomment and duplicate for each managed customer tenant.
# Secrets (client_secret) should live in .secrets.toml under the same key path.
#
# Service tiers:
#   bronze — CE baseline   (Critical BPA checks; CE v3.2 reporting)
#   silver — CE Plus       (Critical + High BPA checks; CE + 10 Steps reporting)
#   gold   — CAF v4.0 full (All BPA checks; full CAF v4.0 + CE + 10 Steps + NSF reporting)
#
# [tenants.customer-a]
# tenant_id              = "tsg-id-for-customer-a"
# client_id              = "svc-account@iam.panserviceaccount.com"
# default_folder         = "Customer-A"
# label                  = "Customer A Corp"
# tier                   = "gold"          # gold | silver | bronze
# service_term_years     = 3               # 1 | 2 | 3
# account_ref            = "CRM-12345"     # CRM / ticketing system reference
# prisma_access_api_key  = "..."           # Optional — Prisma Access admin portal:
#                                          # Settings → Service Setup → Prisma Access API Key
#                                          # Enables live egress IP retrieval in AS-BUILT §8.1
#                                          # (store in .secrets.toml, not here)
#
# [tenants.customer-b]
# tenant_id          = "tsg-id-for-customer-b"
# client_id          = "svc-account-b@iam.panserviceaccount.com"
# default_folder     = "Customer-B"
# label              = "Customer B Ltd"
# tier               = "silver"
# service_term_years = 1
# account_ref        = "CRM-67890"
