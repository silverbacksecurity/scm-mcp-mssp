version: 2

updates:
  # Python dependencies (uv/pip ecosystem)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch updates to reduce PR noise
      python-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # cryptography capped by pan-scm-sdk==0.15.1 at <50.0.0 — re-check this
      # cap whenever pan-scm-sdk is upgraded; tracked in soc2-controls.yaml
      - dependency-name: cryptography
        versions: [">=50.0.0"]
    labels:
      - dependencies
      - python

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
