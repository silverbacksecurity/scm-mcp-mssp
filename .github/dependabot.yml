version: 2

updates:
  # Python dependencies (uv/pip ecosystem)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch updates to reduce PR noise
      python-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # cryptography pinned by pan-scm-sdk<47 — tracked in soc2-controls.yaml
      - dependency-name: cryptography
        versions: [">=47.0.0"]
    labels:
      - dependencies
      - python

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
