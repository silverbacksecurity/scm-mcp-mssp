name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write  # needed for PyPI trusted publishing

jobs:
  release:
    name: Build, publish, and create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          version: latest

      # ── Run full test suite before releasing ─────────────────────────────
      - name: Run tests
        run: uv sync --all-groups && uv run pytest
        env:
          SCM_MCP_SCM_TENANT_ID: "test-tenant"
          SCM_MCP_SCM_CLIENT_ID: "test@iam"
          SCM_MCP_SCM_CLIENT_SECRET: "test-secret"

      # ── Build Python distribution ─────────────────────────────────────────
      - name: Build wheel and sdist
        run: uv build

      # ── Publish to PyPI via trusted publishing ────────────────────────────
      # Configure PyPI trusted publisher at:
      # https://pypi.org/manage/account/publishing/
      # Publisher: GitHub Actions | repo: silverbacksecurity/scm-mcp-mssp
      # continue-on-error so a missing/misconfigured trusted publisher does not
      # block the Docker image and GitHub Release that follow.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          skip-existing: true

      # ── Generate SBOM (CycloneDX) ─────────────────────────────────────────
      # The cyclonedx-bom package ships the `cyclonedx-py` entry point, which
      # takes the requirements file as a positional arg. continue-on-error so a
      # SBOM hiccup never blocks the image + GitHub Release.
      - name: Generate SBOM
        continue-on-error: true
        run: |
          uv export --no-dev --format requirements-txt | grep -v "^-e " > sbom-requirements.txt
          uvx --from cyclonedx-bom cyclonedx-py requirements sbom-requirements.txt \
            --of JSON -o sbom-${{ github.ref_name }}.cdx.json

      # ── Build and push Docker image ───────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Create GitHub Release with artifacts ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom-${{ github.ref_name }}.cdx.json
