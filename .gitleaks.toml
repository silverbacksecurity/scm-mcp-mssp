title = "scm-mcp-mssp gitleaks config"

# Keep all default gitleaks rules; only add the allowlist below.
[extend]
useDefault = true

[allowlist]
description = """Generated pan.dev endpoint catalog: the flagged values are git
blob SHAs of public OpenAPI spec files in PaloAltoNetworks/pan.dev (used for
spec-drift detection), not credentials. Regenerated by
scripts/gen_endpoint_catalog.py; the file never contains tenant data."""
paths = ['''src/scm_mcp_mssp/resources/endpoint_catalog\.json$''']
